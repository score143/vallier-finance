// ── HELPERS ─────────────────────────────────────────────────────────────────
function fmt(v){if(v===""||v===null||v===undefined||isNaN(v))return"—";return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(v);}
function ordinal(n){if(!n)return"—";return n+([,"st","nd","rd"][((n%100-11)*(n%100-13)<0?n%10:n%100)%10]||"th");}
function getCurrentMonth(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}
function monthLabel(ym){if(!ym)return"";const[y,m]=ym.split("-");return new Date(y,m-1,1).toLocaleString("default",{month:"long",year:"numeric"});}
function surroundingMonths(){const now=new Date(),out=[];for(let i=-2;i<=14;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);out.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`)}return out;}
function payoffMonths(balance,rate,payment){if(!balance||!payment||payment<=0)return null;const r=rate/100/12;if(r===0)return Math.ceil(balance/payment);if(payment<=balance*r)return Infinity;return Math.ceil(-Math.log(1-balance*r/payment)/Math.log(1+r));}
function daysUntilDue(dueDay){if(!dueDay)return null;const now=new Date(),target=new Date(now.getFullYear(),now.getMonth(),dueDay);if(target<now)target.setMonth(target.getMonth()+1);return Math.ceil((target-now)/86400000);}
function getDaysInMonth(ym){const[y,m]=ym.split("-");return new Date(y,m,0).getDate();}
function getFirstDOW(ym){const[y,m]=ym.split("-");return new Date(y,m-1,1).getDay();}

// ── PIN SCREEN ───────────────────────────────────────────────────────────────
function PinScreen({onUnlock}){
  const[pin,setPin]=useState("");
  const[error,setError]=useState(false);
  const[shake,setShake]=useState(false);

  function handleKey(k){
    if(k==="del"){setPin(p=>p.slice(0,-1));setError(false);return;}
    if(pin.length>=6)return;
    const next=pin+k;
    setPin(next);
    if(next.length===CORRECT_PIN.length){
      if(next===CORRECT_PIN){
        localStorage.setItem(PIN_STORAGE_KEY,Date.now().toString());
        onUnlock();
      } else {
        setShake(true);setError(true);
        setTimeout(()=>{setPin("");setShake(false);},600);
      }
    }
  }

  const keys=["1","2","3","4","5","6","7","8","9","","0","del"];
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.bg} 0%,${C.bg2} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",padding:24}}>
      <div style={{fontFamily:"Georgia,serif",fontSize:28,fontWeight:700,color:C.gold,marginBottom:8,letterSpacing:1}}>Family Finance Ledger</div>
      <div style={{fontSize:13,color:C.textDim,marginBottom:40}}>Vallier Household — Enter PIN to continue</div>
      <div style={{background:C.panel,border:`1px solid ${C.borderGold}`,borderRadius:20,padding:"32px 40px",width:280,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
        <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:28,animation:shake?"shake 0.4s":"none"}}>
          {Array.from({length:CORRECT_PIN.length}).map((_,i)=>(
            <div key={i} style={{width:16,height:16,borderRadius:"50%",background:i<pin.length?C.gold:"rgba(255,255,255,0.15)",border:`2px solid ${i<pin.length?C.gold:"rgba(255,255,255,0.2)}`,transition:"all .15s"}}/>
          ))}
        </div>
        {error&&<div style={{color:C.red,fontSize:13,marginBottom:12}}>Incorrect PIN — try again</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {keys.map((k,i)=>(
            <button key={i} onClick={()=>k&&handleKey(k)}
              style={{padding:"16px 0",fontSize:k==="del"?14:20,fontWeight:600,border:`1px solid ${C.border}`,borderRadius:10,cursor:k?"pointer":"default",background:k==="del"?C.redDim:k?C.panel:"transparent",color:k==="del"?C.red:C.text,transition:"all .12s",opacity:k?1:0}}
              onMouseEnter={e=>{if(k)e.currentTarget.style.background=k==="del"?"rgba(224,112,112,0.25)":"rgba(255,255,255,0.08)"}}
              onMouseLeave={e=>{if(k)e.currentTarget.style.background=k==="del"?C.redDim:C.panel}}>
              {k==="del"?"⌫":k}
            </button>
          ))}
        </div>
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

function Inp({value,onChange,type="text",placeholder=""}){
  const[foc,setFoc]=useState(false);
  return(<input type={type} value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)} onFocus={()=>setFoc(true)} onBlur={()=>setFoc(false)} style={{width:"100%",background:"rgba(0,0,0,0.3)",border:`1px solid ${foc?C.gold:C.border}`,color:C.text,padding:"9px 13px",borderRadius:8,fontSize:14,outline:"none",transition:"border-color .2s"}}/>);
}
function Sel({value,onChange,options}){return(<select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:"#122018",border:`1px solid ${C.border}`,color:C.text,padding:"9px 13px",borderRadius:8,fontSize:14,outline:"none",cursor:"pointer"}}>{options.map(o=><option key={o} value={o} style={{background:"#122018"}}>{o}</option>)}</select>);}
function Btn({children,onClick,variant="primary",small=false,style:sx={}}){
  const[hov,setHov]=useState(false);
  const base={cursor:"pointer",border:"none",borderRadius:small?7:10,fontWeight:600,padding:small?"5px 12px":"10px 22px",fontSize:small?12:14,transition:"all .15s",...sx};
  const map={primary:{background:"linear-gradient(135deg,#3a7a55,#256040)",color:"#fff"},gold:{background:"linear-gradient(135deg,#b8942a,#957520)",color:"#fff"},blue:{background:C.blueDim,color:C.blue},danger:{background:C.redDim,color:C.red},ghost:{background:"rgba(255,255,255,0.07)",color:C.textDim}};
  return(<button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{...base,...map[variant],filter:hov?"brightness(1.2)":"none",transform:hov?"scale(1.02)":"none"}}>{children}</button>);
}
function FLabel({label,children}){return(<div><label style={{fontSize:11,color:C.textDim,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.8}}>{label}</label>{children}</div>);}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const[accounts,setAccounts]=useState(()=>{try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch{}return PRELOADED;});
  const[month,setMonth]=useState(getCurrentMonth);
  const[tab,setTab]=useState("dashboard");
  const[editId,setEditId]=useState(null);
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState(blankForm());
  const[showPw,setShowPw]=useState({});
  const[expanded,setExpanded]=useState({});
  const[payModal,setPayModal]=useState(null);
  const[payAmt,setPayAmt]=useState("");
  const[payNote,setPayNote]=useState("");
  const[calMonth,setCalMonth]=useState(getCurrentMonth);
  const[annualYear,setAnnualYear]=useState(new Date().getFullYear());

  useEffect(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(accounts));}catch{}},[accounts]);

  // Auto-record autopay
  useEffect(()=>{
    const today=new Date();
    const ym=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`;
    let updated=false;
    const newAccounts=accounts.map(a=>{
      if(!a.autopay||!a.monthlyPayment||parseFloat(a.monthlyPayment)<=0||!a.dueDate)return a;
      if(today.getDate()<parseInt(a.dueDate))return a;
      if((a.payments||[]).some(p=>p.month===ym))return a;
      updated=true;
      const payments=[...(a.payments||[]),{month:ym,amount:parseFloat(a.monthlyPayment),note:"Auto-recorded (autopay)",date:new Date(today.getFullYear(),today.getMonth(),parseInt(a.dueDate)).toLocaleDateString()}];
      return{...a,payments};
    });
    if(updated)setAccounts(newAccounts);
  },[]);

  const months=surroundingMonths();
  function saveAccount(){if(!form.name.trim())return;if(editId!==null){setAccounts(p=>p.map(a=>a.id===editId?{...a,...form}:a));setEditId(null);}else{setAccounts(p=>[...p,{...form,id:Date.now(),payments:[]}]);}setForm(blankForm());setShowForm(false);}
  function startEdit(a){setForm({name:a.name,category:a.category,holder:a.holder||"Joint",balance:a.balance,minPayment:a.minPayment||"",monthlyPayment:a.monthlyPayment,dueDate:a.dueDate,interestRate:a.interestRate,accountNumber:a.accountNumber||"",autopay:!!a.autopay,website:a.website,username:a.username,password:a.password,phone:a.phone||"",notes:a.notes});setEditId(a.id);setShowForm(true);setTab("accounts");window.scrollTo({top:0,behavior:"smooth"});}
  function deleteAccount(id){if(window.confirm("Remove this account permanently?"))setAccounts(p=>p.filter(a=>a.id!==id));}
  function setF(k,v){setForm(f=>({...f,[k]:v}));}
  function getMP(a,m){return(a.payments||[]).filter(p=>p.month===m);}
  function getPaid(a,m){return getMP(a,m).reduce((s,p)=>s+p.amount,0);}
  function isFullPaid(a,m){const d=parseFloat(a.monthlyPayment)||0;return d>0&&getPaid(a,m)>=d;}
  function recordPayment(){if(!payAmt||isNaN(payAmt))return;const amt=parseFloat(payAmt);setAccounts(p=>p.map(a=>{if(a.id!==payModal)return a;const payments=[...(a.payments||[]),{month,amount:amt,note:payNote,date:new Date().toLocaleDateString()}];return{...a,payments};}));setPayModal(null);setPayAmt("");setPayNote("");}
  function removePayment(aid,idx){setAccounts(p=>p.map(a=>{if(a.id!==aid)return a;return{...a,payments:a.payments.filter((_,i)=>i!==idx)};}));}
  function updateBalance(id,val){setAccounts(p=>p.map(a=>a.id===id?{...a,balance:val}:a));}

  const billable=accounts.filter(a=>parseFloat(a.monthlyPayment)>0);
  const totalDue=billable.reduce((s,a)=>s+(parseFloat(a.monthlyPayment)||0),0);
  const totalPaid=billable.reduce((s,a)=>s+getPaid(a,month),0);
  const totalRemaining=Math.max(0,totalDue-totalPaid);
  const totalBalance=accounts.reduce((s,a)=>s+(parseFloat(a.balance)||0),0);
  const autopayList=accounts.filter(a=>a.autopay);
  function annualPaid(a,yr){return(a.payments||[]).filter(p=>p.month?.startsWith(String(yr))).reduce((s,p)=>s+p.amount,0);}

  function printSummary(){
    const w=window.open("","_blank");
    const rows=accounts.map(a=>{const paid=getPaid(a,month);const due=parseFloat(a.monthlyPayment)||0;return`<tr><td>${a.name}</td><td>${a.category}</td><td>${a.holder||"—"}</td><td>${fmt(a.balance)}</td><td>${a.interestRate?a.interestRate+"%":"—"}</td><td>${a.dueDate?ordinal(a.dueDate):"—"}</td><td>${due?fmt(due):"Info only"}</td><td>${paid?fmt(paid):"—"}</td><td>${!due?"N/A":paid>=due?"✓ PAID":"Pending"}</td></tr>`;}).join("");
    w.document.write(`<html><head><title>Finance Summary — ${monthLabel(month)}</title><style>body{font-family:Georgia,serif;padding:30px}table{width:100%;border-collapse:collapse}th{background:#1a3a2a;color:#fff;padding:8px 12px;text-align:left;font-size:12px}td{padding:8px 12px;border-bottom:1px solid #ddd;font-size:13px}tfoot td{font-weight:bold;background:#f0f7f3}</style></head><body><h1>Family Finance Ledger — ${monthLabel(month)}</h1><p>Printed ${new Date().toLocaleDateString()}</p><table><thead><tr><th>Account</th><th>Category</th><th>Holder</th><th>Balance</th><th>Rate</th><th>Due Date</th><th>Monthly</th><th>Paid</th><th>Status</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="6">TOTALS</td><td>${fmt(totalDue)}</td><td>${fmt(totalPaid)}</td><td>${totalRemaining<=0?"All Paid!":fmt(totalRemaining)+" remaining"}</td></tr></tfoot></table></body></html>`);
    w.document.close();w.print();
  }

  const calDays=getDaysInMonth(calMonth);
  const calOffset=getFirstDOW(calMonth);
  const TABS=[["dashboard","📊 Dashboard"],["accounts","🗂 Accounts"],["calendar","📅 Calendar"],["history","📋 History"],["annual","📈 Annual"],["hawaii","🌺 Hawaii Rentals"]];

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.bg} 0%,${C.bg2} 100%)`,fontFamily:"'Segoe UI',Arial,sans-serif",color:C.text}}>
      {/* HEADER */}
      <div style={{background:"rgba(0,0,0,0.35)",borderBottom:`1px solid ${C.border}`,padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:200,backdropFilter:"blur(12px)"}}>
        <div>
          <div style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:700,color:C.gold,letterSpacing:1}}>Family Finance Ledger</div>
          <div style={{fontSize:11,color:C.textDim,marginTop:1}}>Vallier Household · 699</div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <select value={month} onChange={e=>setMonth(e.target.value)} style={{background:"rgba(0,0,0,0.4)",border:`1px solid ${C.borderGold}`,color:C.text,padding:"6px 12px",borderRadius:8,fontSize:13,cursor:"pointer"}}>
            {months.map(m=><option key={m} value={m} style={{background:C.bg2}}>{monthLabel(m)}</option>)}
          </select>
          <Btn onClick={printSummary} variant="ghost" small>🖨 Print</Btn>
          <Btn onClick={()=>{localStorage.removeItem(PIN_STORAGE_KEY);window.location.reload();}} variant="ghost" small>🔒 Lock</Btn>
        </div>
      </div>

      {/* TABS */}
      <div style={{padding:"0 24px",display:"flex",gap:2,marginTop:12,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        {TABS.map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{padding:"9px 16px",border:"none",cursor:"pointer",background:"transparent",fontSize:13,fontWeight:600,color:tab===k?C.gold:C.textDim,borderBottom:tab===k?`2px solid ${C.gold}`:"2px solid transparent",transition:"color .2s",whiteSpace:"nowrap"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:"20px 24px 64px",maxWidth:1300,margin:"0 auto"}}>

        {/* ══ DASHBOARD ══ */}
        {tab==="dashboard"&&(
          <div>
            <div style={{background:"rgba(106,175,214,0.07)",border:"1px solid rgba(106,175,214,0.25)",borderRadius:12,padding:"11px 18px",marginBottom:16,fontSize:12,color:C.blue}}>
              ℹ️ <strong>USAA Home Insurance</strong> ($2,338.34/yr) is paid through mortgage escrow — no separate payment needed.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:12,marginBottom:22}}>
              <StatCard icon="💳" label="Total Balances Owed" value={fmt(totalBalance)} color={C.red}/>
              <StatCard icon="📅" label={`Due — ${monthLabel(month)}`} value={fmt(totalDue)} color={C.gold}/>
              <StatCard icon="✅" label="Paid This Month" value={fmt(totalPaid)} color={C.green}/>
              <StatCard icon="⏳" label="Still Remaining" value={totalRemaining<=0?"All Paid! 🎉":fmt(totalRemaining)} color={totalRemaining<=0?C.green:C.red}/>
              <StatCard icon="🤖" label="On Autopay" value={`${autopayList.length} accounts`} color={C.blue} sub={autopayList.slice(0,3).map(a=>a.name).join(", ")+(autopayList.length>3?"…":"")}/>
            </div>
            {(()=>{const soon=billable.filter(a=>{const d=daysUntilDue(a.dueDate);return d!==null&&d<=5&&!isFullPaid(a,month);});return soon.length>0&&(<div style={{background:C.redDim,border:`1px solid ${C.red}`,borderRadius:12,padding:"13px 18px",marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:7}}>⚠️ Due Within 5 Days</div><div style={{display:"flex",flexWrap:"wrap",gap:7}}>{soon.map(a=><Badge key={a.id} color={C.red} bg={C.redDim}>{a.name} — {daysUntilDue(a.dueDate)}d</Badge>)}</div></div>);})()}
            {(()=>{const near=accounts.filter(a=>{const b=parseFloat(a.balance),p=parseFloat(a.monthlyPayment);return b>0&&p>0&&b<p*3;});return near.length>0&&(<div style={{background:C.greenDim,border:`1px solid ${C.green}`,borderRadius:12,padding:"13px 18px",marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:C.green,marginBottom:7}}>🎯 Almost Paid Off!</div><div style={{display:"flex",flexWrap:"wrap",gap:7}}>{near.map(a=><Badge key={a.id} color={C.green} bg={C.greenDim}>{a.name} — {fmt(a.balance)} left</Badge>)}</div></div>);})()}
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
              <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`,fontFamily:"Georgia,serif",fontSize:15,color:C.gold}}>{monthLabel(month)} — Payment Overview</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:"rgba(0,0,0,0.25)"}}>
                    {["Account","Holder","Balance","Rate","Min","Monthly Due","Due Date","Paid","Status",""].map(h=>(
                      <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:10,textTransform:"uppercase",letterSpacing:.9,color:C.textDim,fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {accounts.map((a,idx)=>{
                      const paid=getPaid(a,month);const due=parseFloat(a.monthlyPayment)||0;const full=isFullPaid(a,month);const days=daysUntilDue(a.dueDate);const infoOnly=!due;
                      return(<tr key={a.id} className="rh" style={{borderBottom:`1px solid ${C.border}`,opacity:infoOnly?.7:1,background:full?"rgba(93,184,122,0.04)":infoOnly?"rgba(106,175,214,0.03)":idx%2===0?"rgba(0,0,0,0.08)":"transparent"}}>
                        <td style={{padding:"11px 12px",fontWeight:600,color:C.text,whiteSpace:"nowrap"}}>
                          {a.name}
                          {a.autopay&&<span style={{marginLeft:5,fontSize:10,color:C.blue,background:C.blueDim,padding:"1px 6px",borderRadius:6}}>AUTO</span>}
                          {infoOnly&&<span style={{marginLeft:5,fontSize:10,color:C.blue,background:C.blueDim,padding:"1px 6px",borderRadius:6}}>INFO</span>}
                        </td>
                        <td style={{padding:"11px 12px"}}><Badge color={a.holder==="Dad"?C.blue:a.holder==="Wife"?C.purple:C.gold}>{a.holder||"—"}</Badge></td>
                        <td style={{padding:"11px 12px",color:C.red,fontWeight:700}}>{fmt(a.balance)}</td>
                        <td style={{padding:"11px 12px",color:C.purple}}>{a.interestRate?`${a.interestRate}%`:"—"}</td>
                        <td style={{padding:"11px 12px",color:C.textDim,fontSize:13}}>{a.minPayment?fmt(a.minPayment):"—"}</td>
                        <td style={{padding:"11px 12px",color:infoOnly?C.textDim:C.gold,fontWeight:700}}>{infoOnly?"(escrow)":fmt(due)}</td>
                        <td style={{padding:"11px 12px",color:C.textDim,whiteSpace:"nowrap"}}>{a.dueDate?ordinal(a.dueDate):"—"}{a.dueDate&&!full&&days!==null&&days<=7&&<span style={{marginLeft:4,fontSize:10,color:days<=3?C.red:C.gold}}>{days}d</span>}</td>
                        <td style={{padding:"11px 12px",color:C.green,fontWeight:600}}>{paid?fmt(paid):"—"}</td>
                        <td style={{padding:"11px 12px"}}>{infoOnly?<Badge color={C.blue} bg={C.blueDim}>Escrow</Badge>:full?<Badge color={C.green} bg={C.greenDim}>✓ PAID</Badge>:paid>0?<Badge color={C.gold} bg="rgba(201,168,76,0.12)">Partial</Badge>:<Badge color={C.red} bg={C.redDim}>Pending</Badge>}</td>
                        <td style={{padding:"11px 12px"}}>{!infoOnly&&<Btn onClick={()=>setPayModal(a.id)} variant="primary" small>+ Pay</Btn>}</td>
                      </tr>);
                    })}
                  </tbody>
                  <tfoot><tr style={{background:"rgba(0,0,0,0.3)",borderTop:`2px solid ${C.borderGold}`}}>
                    <td colSpan={5} style={{padding:"11px 12px",fontFamily:"Georgia,serif",color:C.gold,fontWeight:700,fontSize:14}}>TOTALS (billable)</td>
                    <td style={{padding:"11px 12px",fontFamily:"Georgia,serif",color:C.gold,fontWeight:700,fontSize:14}}>{fmt(totalDue)}</td>
                    <td/>
                    <td style={{padding:"11px 12px",fontFamily:"Georgia,serif",color:C.green,fontWeight:700,fontSize:14}}>{fmt(totalPaid)}</td>
                    <td colSpan={2} style={{padding:"11px 12px",fontFamily:"Georgia,serif",color:totalRemaining<=0?C.green:C.red,fontWeight:700,fontSize:14}}>{totalRemaining<=0?"🎉 All Paid!":fmt(totalRemaining)+" left"}</td>
                  </tr></tfoot>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ══ ACCOUNTS ══ */}
        {tab==="accounts"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontFamily:"Georgia,serif",fontSize:18,color:C.gold}}>All Accounts</div>
              <Btn onClick={()=>{setForm(blankForm());setEditId(null);setShowForm(true);}}>+ Add Account</Btn>
            </div>
            {showForm&&(
              <div style={{background:"rgba(0,0,0,0.25)",border:`1px solid ${C.borderGold}`,borderRadius:16,padding:22,marginBottom:20}}>
                <div style={{fontFamily:"Georgia,serif",fontSize:16,color:C.gold,marginBottom:14}}>{editId?"Edit Account":"New Account"}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(185px,1fr))",gap:12}}>
                  <FLabel label="Account Name *"><Inp value={form.name} onChange={v=>setF("name",v)} placeholder="e.g. Chase Visa"/></FLabel>
                  <FLabel label="Category"><Sel value={form.category} onChange={v=>setF("category",v)} options={CATEGORIES}/></FLabel>
                  <FLabel label="Holder"><Sel value={form.holder} onChange={v=>setF("holder",v)} options={HOLDERS}/></FLabel>
                  <FLabel label="Balance ($)"><Inp type="number" value={form.balance} onChange={v=>setF("balance",v)} placeholder="0.00"/></FLabel>
                  <FLabel label="Min Payment ($)"><Inp type="number" value={form.minPayment} onChange={v=>setF("minPayment",v)} placeholder="0.00"/></FLabel>
                  <FLabel label="Monthly Payment ($)"><Inp type="number" value={form.monthlyPayment} onChange={v=>setF("monthlyPayment",v)} placeholder="0.00"/></FLabel>
                  <FLabel label="Due Date (day)"><Inp type="number" value={form.dueDate} onChange={v=>setF("dueDate",v)} placeholder="15"/></FLabel>
                  <FLabel label="Interest Rate (%)"><Inp type="number" value={form.interestRate} onChange={v=>setF("interestRate",v)} placeholder="19.99"/></FLabel>
                  <FLabel label="Account Number"><Inp value={form.accountNumber} onChange={v=>setF("accountNumber",v)} placeholder="last 4 digits"/></FLabel>
                  <FLabel label="Website"><Inp value={form.website} onChange={v=>setF("website",v)} placeholder="https://..."/></FLabel>
                  <FLabel label="Username / Email"><Inp value={form.username} onChange={v=>setF("username",v)} placeholder="user@email.com"/></FLabel>
                  <FLabel label="Password"><Inp type="password" value={form.password} onChange={v=>setF("password",v)} placeholder="••••••••"/></FLabel>
                  <FLabel label="Phone"><Inp value={form.phone} onChange={v=>setF("phone",v)} placeholder="1-800-..."/></FLabel>
                  <FLabel label="Notes"><textarea value={form.notes} onChange={e=>setF("notes",e.target.value)} rows={2} placeholder="Extra notes..." style={{width:"100%",background:"rgba(0,0,0,0.3)",border:`1px solid ${C.border}`,color:C.text,padding:"9px 13px",borderRadius:8,fontSize:14,resize:"vertical"}}/></FLabel>
                  <FLabel label="Autopay">
                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6}}>
                      <div onClick={()=>setF("autopay",!form.autopay)} style={{width:40,height:21,borderRadius:11,cursor:"pointer",background:form.autopay?C.green:"rgba(255,255,255,0.1)",position:"relative",transition:"background .2s"}}>
                        <div style={{position:"absolute",top:2,left:form.autopay?21:2,width:17,height:17,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}/>
                      </div>
                      <span style={{fontSize:13,color:form.autopay?C.green:C.textDim}}>{form.autopay?"Yes":"No"}</span>
                    </div>
                  </FLabel>
                </div>
                <div style={{display:"flex",gap:10,marginTop:16}}>
                  <Btn onClick={saveAccount}>{editId?"Save Changes":"Add Account"}</Btn>
                  <Btn onClick={()=>{setShowForm(false);setEditId(null);setForm(blankForm());}} variant="ghost">Cancel</Btn>
                </div>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
              {accounts.map(a=>{
                const paid=getPaid(a,month);const due=parseFloat(a.monthlyPayment)||0;const infoOnly=!due;
                const mo=payoffMonths(parseFloat(a.balance),parseFloat(a.interestRate),parseFloat(a.monthlyPayment));
                const isExp=expanded[a.id];const pwVis=showPw[a.id];
                return(<div key={a.id} style={{background:C.panel,border:`1px solid ${infoOnly?"rgba(106,175,214,0.2)":C.border}`,borderRadius:16,padding:18,transition:"box-shadow .2s",opacity:infoOnly?.85:1}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 6px 28px rgba(0,0,0,0.35)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontFamily:"Georgia,serif",fontSize:14,fontWeight:700,color:C.text,marginBottom:5,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        {a.name}{a.autopay&&<Badge color={C.blue}>AUTO</Badge>}{infoOnly&&<Badge color={C.blue}>INFO</Badge>}
                      </div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        <Badge>{a.category}</Badge>
                        <Badge color={a.holder==="Dad"?C.blue:a.holder==="Wife"?C.purple:C.gold}>{a.holder||"Joint"}</Badge>
                        {a.accountNumber&&<Badge color={C.textDim} bg="rgba(255,255,255,0.05)">••{a.accountNumber.slice(-4)}</Badge>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      <Btn onClick={()=>startEdit(a)} variant="blue" small>Edit</Btn>
                      <Btn onClick={()=>deleteAccount(a.id)} variant="danger" small>✕</Btn>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
                    {[{l:"Balance",v:fmt(a.balance),c:C.red},{l:"Monthly",v:fmt(a.monthlyPayment),c:C.gold},{l:"Min Pmt",v:a.minPayment?fmt(a.minPayment):"—",c:C.textDim},{l:"Interest",v:a.interestRate?`${a.interestRate}%`:"—",c:C.purple},{l:"Due Date",v:a.dueDate?ordinal(a.dueDate):"—",c:C.blue},{l:"Payoff Est.",v:mo===null?"—":mo===Infinity?"Too low":mo<=1?"<1 mo":`~${mo} mo`,c:mo&&mo!==Infinity&&mo<12?C.green:C.textDim}].map(item=>(
                      <div key={item.l} style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"7px 10px"}}>
                        <div style={{fontSize:9,color:C.textDim,textTransform:"uppercase",letterSpacing:.7,marginBottom:2}}>{item.l}</div>
                        <div style={{fontSize:13,fontWeight:700,color:item.c}}>{item.v}</div>
                      </div>
                    ))}
                  </div>
                  {!infoOnly&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.7,whiteSpace:"nowrap"}}>Update Balance:</span>
                    <input type="number" defaultValue={a.balance} onBlur={e=>updateBalance(a.id,e.target.value)} style={{width:100,background:"rgba(0,0,0,0.3)",border:`1px solid ${C.border}`,color:C.text,padding:"4px 8px",borderRadius:7,fontSize:13,outline:"none"}}/>
                  </div>}
                  <button onClick={()=>setExpanded(p=>({...p,[a.id]:!isExp}))} style={{width:"100%",background:"rgba(0,0,0,0.2)",border:`1px solid ${C.border}`,color:C.textDim,padding:"5px",borderRadius:7,cursor:"pointer",fontSize:11,marginBottom:isExp?8:0}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.06)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(0,0,0,0.2)"}>{isExp?"▲ Hide Login Info":"▼ Show Login Info"}</button>
                  {isExp&&<div style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                    {a.website&&<div style={{marginBottom:4,fontSize:13}}>🌐 <a href={a.website} target="_blank" rel="noreferrer" style={{color:C.blue,textDecoration:"none"}}>{a.website.replace(/^https?:\/\//,"")}</a></div>}
                    {a.username&&<div style={{marginBottom:4,fontSize:13,color:C.text}}>👤 {a.username}</div>}
                    {a.password&&<div style={{marginBottom:4,fontSize:13,color:C.text,display:"flex",gap:6,alignItems:"center"}}>🔑 {pwVis?a.password:""}<Btn onClick={()=>setShowPw(p=>({...p,[a.id]:!pwVis}))} variant="ghost" small>{pwVis?"Hide":"Show"}</Btn></div>}
                    {a.phone&&<div style={{fontSize:13,color:C.text}}>📞 {a.phone}</div>}
                    {!a.website&&!a.username&&!a.password&&!a.phone&&<div style={{fontSize:12,color:C.textDim,fontStyle:"italic"}}>No login info stored.</div>}
                  </div>}
                  {a.notes&&<div style={{fontSize:11,color:C.textDim,fontStyle:"italic",marginBottom:8}}>📝 {a.notes}</div>}
                  {!infoOnly&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:8,borderTop:`1px solid ${C.border}`}}>

                    <Btn onClick={()=>setPayModal(a.id)} variant={isFullPaid(a,month)?"ghost":"primary"} small>{isFullPaid(a,month)?"✓ Add More":"+ Payment"}</Btn>

                  {infoOnly&&<div style={{paddingTop:8,borderTop:`1px solid ${C.border}`,fontSize:11,color:C.blue,fontStyle:"italic"}}>Paid via mortgage escrow — no action needed</div>}
                </div>);
              })}
            </div>
          </div>
        )}

        {/* ══ CALENDAR ══ */}
        {tab==="calendar"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontFamily:"Georgia,serif",fontSize:18,color:C.gold}}>Due Date Calendar</div>
              <select value={calMonth} onChange={e=>setCalMonth(e.target.value)} style={{background:"rgba(0,0,0,0.4)",border:`1px solid ${C.borderGold}`,color:C.text,padding:"6px 12px",borderRadius:8,fontSize:13,cursor:"pointer"}}>{months.map(m=><option key={m} value={m} style={{background:C.bg2}}>{monthLabel(m)}</option>)}</select>
            </div>
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>

                {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:"8px",textAlign:"center",fontSize:10,textTransform:"uppercase",letterSpacing:.8,color:C.textDim,fontWeight:600}}>{d}</div>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
                {Array.from({length:calOffset}).map((_,i)=><div key={`e${i}`} style={{minHeight:75,borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,background:"rgba(0,0,0,0.08)"}}/>)}
                {Array.from({length:calDays}).map((_,i)=>{
                  const day=i+1;const dayAccts=accounts.filter(a=>parseInt(a.dueDate)===day&&parseFloat(a.monthlyPayment)>0);
                  const today=new Date();const[cy,cm]=calMonth.split("-");const isToday=today.getDate()===day&&today.getMonth()===parseInt(cm)-1&&today.getFullYear()===parseInt(cy);
                  return(<div key={day} style={{minHeight:75,borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,padding:"6px",background:isToday?"rgba(201,168,76,0.07)":"transparent"}}>
                    <div style={{fontSize:11,fontWeight:700,color:isToday?C.gold:C.textDim,marginBottom:3}}>{day}</div>
                    {dayAccts.map(a=>{const fp=isFullPaid(a,calMonth);return(<div key={a.id} style={{fontSize:9,padding:"2px 5px",borderRadius:4,marginBottom:2,background:fp?C.greenDim:C.redDim,color:fp?C.green:C.red,lineHeight:1.4}}>{a.name}{fp&&" ✓"}</div>);})}
                  </div>);
                })}
              </div>
            </div>
          </div>
        )}

        {/* ══ HISTORY ══ */}
        {tab==="history"&&(
          <div>
            <div style={{fontFamily:"Georgia,serif",fontSize:18,color:C.gold,marginBottom:16}}>Payment History — {monthLabel(month)}</div>
            {billable.map(a=>{const mps=getMP(a,month);return(
              <div key={a.id} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 18px",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:mps.length?10:0,flexWrap:"wrap",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"Georgia,serif",fontSize:14,fontWeight:700,color:C.text}}>{a.name}</span>
                    <span style={{fontSize:12,color:C.textDim}}>Due: {fmt(a.monthlyPayment)} | Paid: <span style={{color:C.green,fontWeight:600}}>{fmt(getPaid(a,month))}</span></span>
                  </div>
                  <div style={{display:"flex",gap:7,alignItems:"center"}}>
                    {isFullPaid(a,month)&&<Badge color={C.green} bg={C.greenDim}>✓ COMPLETE</Badge>}
                    <Btn onClick={()=>setPayModal(a.id)} variant="primary" small>+ Payment</Btn>
                  </div>
                </div>
                {mps.length===0?<div style={{fontSize:12,color:C.textDim,fontStyle:"italic"}}>No payments recorded this month.</div>:(
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr>{["Date","Amount","Note",""].map(h=><th key={h} style={{textAlign:"left",padding:"5px 10px",fontSize:9,color:C.textDim,textTransform:"uppercase",letterSpacing:.7,fontWeight:600}}>{h}</th>)}</tr></thead>
                    <tbody>{mps.map((p,idx)=><tr key={idx} style={{borderTop:`1px solid ${C.border}`}}>
                      <td style={{padding:"7px 10px",fontSize:12,color:C.textDim}}>{p.date}</td>
                      <td style={{padding:"7px 10px",fontSize:13,fontWeight:700,color:C.green}}>{fmt(p.amount)}</td>
                      <td style={{padding:"7px 10px",fontSize:12,color:C.textDim,fontStyle:"italic"}}>{p.note||"—"}</td>
                      <td style={{padding:"7px 10px",textAlign:"right"}}><Btn onClick={()=>removePayment(a.id,idx)} variant="danger" small>Remove</Btn></td>
                    </tr>)}</tbody>
                  </table>
                )}
              </div>
            );})}
          </div>
        )}

        {/* ══ ANNUAL ══ */}
        {tab==="annual"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontFamily:"Georgia,serif",fontSize:18,color:C.gold}}>Annual Overview</div>
              <select value={annualYear} onChange={e=>setAnnualYear(parseInt(e.target.value))} style={{background:"rgba(0,0,0,0.4)",border:`1px solid ${C.borderGold}`,color:C.text,padding:"6px 12px",borderRadius:8,fontSize:13,cursor:"pointer"}}>{[2024,2025,2026,2027,2028].map(y=><option key={y} value={y} style={{background:C.bg2}}>{y}</option>)}</select>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:12,marginBottom:20}}>
              <StatCard icon="💰" label={`Total Paid ${annualYear}`} value={fmt(accounts.reduce((s,a)=>s+annualPaid(a,annualYear),0))} color={C.green}/>
              <StatCard icon="📆" label="Projected Annual" value={fmt(totalDue*12)} color={C.gold}/>
              <StatCard icon="🏦" label="Total Balance" value={fmt(totalBalance)} color={C.red}/>
            </div>
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden",marginBottom:20}}>
              <div style={{padding:"12px 18px",borderBottom:`1px solid ${C.border}`,fontFamily:"Georgia,serif",fontSize:14,color:C.gold}}>Monthly Breakdown — {annualYear}</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:"rgba(0,0,0,0.25)"}}>
                    <th style={{padding:"8px 12px",textAlign:"left",fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.8}}>Month</th>
                    {billable.map(a=><th key={a.id} style={{padding:"8px 12px",textAlign:"left",fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.8,whiteSpace:"nowrap"}}>{a.name}</th>)}
                    <th style={{padding:"8px 12px",textAlign:"left",fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.8}}>Total</th>
                  </tr></thead>
                  <tbody>{Array.from({length:12}).map((_,mi)=>{const ym=`${annualYear}-${String(mi+1).padStart(2,"0")}`;const rowTotal=billable.reduce((s,a)=>s+getPaid(a,ym),0);return(
                    <tr key={ym} className="rh" style={{borderBottom:`1px solid ${C.border}`,background:mi%2===0?"rgba(0,0,0,0.08)":"transparent"}}>
                      <td style={{padding:"8px 12px",fontSize:13,color:C.text,fontWeight:600}}>{new Date(annualYear,mi,1).toLocaleString("default",{month:"short"})}</td>
                      {billable.map(a=>{const p=getPaid(a,ym);return<td key={a.id} style={{padding:"8px 12px",fontSize:13,color:p>0?C.green:C.textDim}}>{p>0?fmt(p):"—"}</td>;})}
                      <td style={{padding:"8px 12px",fontSize:13,fontWeight:700,color:rowTotal>0?C.gold:C.textDim}}>{rowTotal>0?fmt(rowTotal):"—"}</td>
                    </tr>);})}</tbody>
                  <tfoot><tr style={{background:"rgba(0,0,0,0.3)",borderTop:`2px solid ${C.borderGold}`}}>
                    <td style={{padding:"10px 12px",fontSize:13,fontWeight:700,color:C.gold}}>TOTAL</td>
                    {billable.map(a=><td key={a.id} style={{padding:"10px 12px",fontSize:13,fontWeight:700,color:C.green}}>{fmt(annualPaid(a,annualYear))}</td>)}
                    <td style={{padding:"10px 12px",fontSize:13,fontWeight:700,color:C.gold}}>{fmt(billable.reduce((s,a)=>s+annualPaid(a,annualYear),0))}</td>
                  </tr></tfoot>
                </table>
              </div>
            </div>
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
              <div style={{padding:"12px 18px",borderBottom:`1px solid ${C.border}`,fontFamily:"Georgia,serif",fontSize:14,color:C.gold}}>🎯 Payoff Projector</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:"rgba(0,0,0,0.25)"}}>
                    {["Account","Balance","Rate","Monthly","Est. Months","Est. Payoff","Total Interest"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.8,whiteSpace:"nowrap"}}>{h}</th>)}
                  </tr></thead>
                  <tbody>{accounts.filter(a=>parseFloat(a.balance)>0).map((a,idx)=>{
                    const bal=parseFloat(a.balance)||0,rate=parseFloat(a.interestRate)||0,pmt=parseFloat(a.monthlyPayment)||0;
                    const mo=payoffMonths(bal,rate,pmt);
                    const payoffDate=mo&&mo!==Infinity?(()=>{const d=new Date();d.setMonth(d.getMonth()+mo);return d.toLocaleString("default",{month:"short",year:"numeric"});})():null;
                    const totalInterest=mo&&mo!==Infinity?Math.max(0,pmt*mo-bal):null;
                    return(<tr key={a.id} className="rh" style={{borderBottom:`1px solid ${C.border}`,background:idx%2===0?"rgba(0,0,0,0.08)":"transparent"}}>
                      <td style={{padding:"10px 12px",fontWeight:600,color:C.text}}>{a.name}</td>
                      <td style={{padding:"10px 12px",color:C.red,fontWeight:700}}>{fmt(bal)}</td>
                      <td style={{padding:"10px 12px",color:C.purple}}>{rate?`${rate}%`:"—"}</td>
                      <td style={{padding:"10px 12px",color:C.gold,fontWeight:700}}>{pmt?fmt(pmt):"—"}</td>
                      <td style={{padding:"10px 12px",fontWeight:700,color:mo===Infinity?C.red:mo&&mo<12?C.green:C.textDim}}>{mo===null?"—":mo===Infinity?"Pmt too low":mo<=1?"<1 mo":`${mo} mo`}</td>
                      <td style={{padding:"10px 12px",color:C.blue}}>{payoffDate||"—"}</td>
                      <td style={{padding:"10px 12px",color:C.textDim}}>{totalInterest!=null?fmt(totalInterest):"—"}</td>
                    </tr>);
                  })}</tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ══ HAWAII RENTALS ══ */}
        {tab==="hawaii"&&(
          <div>
            <div style={{fontFamily:"Georgia,serif",fontSize:18,color:C.gold,marginBottom:20}}>🌺 Hawaii Rental Properties</div>
            <div style={{background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:12,padding:"12px 18px",marginBottom:18,fontSize:13,color:C.gold}}>
              🚚 <strong>Pay Lani Metcalf $791 — Truck Insurance</strong>
            </div>
            {[{title:"Banyans — 710-16268 Alii Dr #401",color:C.blue,items:[
              {label:"Mr. Cooper Mortgage",detail:"Loan# ••••4659 · $4,214.89/mo",sub:"mrcooper.com · Login: (see secure records)"},
              {label:"Banyans HOA",detail:"Balance owed: $8,635.97 · $1,330.34/mo"},
              {label:"First Insurance Co",detail:"Acct# ••••1704 · $655.00 · Due 4/20",sub:"www.ficon.com · Login: (see secure records)"},
              {label:"Hawaiian Electric",detail:"$350–$450/mo (varies)",sub:"Login: (see secure records)"},
            ]},{title:"Holualoa Bay Villas — 710-16225 Alii Dr #101",color:C.green,items:[
              {label:"Shellpoint Mortgage",detail:"Loan# ••••0448 · $6,227.55/mo · Due 5/1/26",sub:"shellpointmtg.com · Login: (see secure records)"},
              {label:"RLI Insurance",detail:"Policy# ••••4929 · $1,170.00"},
              {label:"HOA",detail:"Balance owed: $5,721.76 · $1,700/mo"},
              {label:"Hawaiian Electric",detail:"$350–$400/mo (varies)",sub:"hawaiianelectric.com · Login: (see secure records)"},
            ]}].map(prop=>(
              <div key={prop.title} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:18}}>
                <div style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:prop.color,marginBottom:14,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>{prop.title}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
                  {prop.items.map(item=>(
                    <div key={item.label} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"11px 13px"}}>
                      <div style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>{item.label}</div>
                      <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:item.sub?3:0}}>{item.detail}</div>
                      {item.sub&&<div style={{fontSize:11,color:C.textDim,fontStyle:"italic"}}>{item.sub}</div>}
                    </div>
                  ))}
                </div>
              </div>
            ))}
            {[{title:"Property Management",color:C.purple,items:[
              {label:"Portals",detail:"app.townsq.io · hawaiianprop.com"},
              {label:"Email",detail:"KandGHawaiirentals@gmail.com"},
              {label:"Account #",detail:"60257-9225"},
              {label:"Password",detail:"(see secure records)"},
            ]},{title:"Hawaii Dept of Taxation",color:C.red,items:[
              {label:"Website",detail:"hitax.hawaii.gov"},
              {label:"Username (Kris & Garry)",detail:"(see secure records)"},
              {label:"Login",detail:"garryvallier@gmail.com"},
              {label:"Password",detail:"(see secure records)"},
            ]}].map(prop=>(
              <div key={prop.title} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:18}}>
                <div style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:prop.color,marginBottom:14,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>{prop.title}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
                  {prop.items.map(item=>(
                    <div key={item.label} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"11px 13px"}}>
                      <div style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>{item.label}</div>
                      <div style={{fontSize:13,fontWeight:600,color:C.text}}>{item.detail}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

      </div>

      {/* PAYMENT MODAL */}
      {payModal!==null&&(()=>{
        const acct=accounts.find(a=>a.id===payModal);if(!acct)return null;
        return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,backdropFilter:"blur(6px)"}}>
          <div style={{background:"#122018",border:`1px solid ${C.borderGold}`,borderRadius:20,padding:28,width:360,boxShadow:"0 24px 64px rgba(0,0,0,0.6)"}}>
            <div style={{fontFamily:"Georgia,serif",fontSize:18,color:C.gold,marginBottom:4}}>Record Payment</div>
            <div style={{fontSize:13,color:C.textDim,marginBottom:18}}>{acct.name} — {monthLabel(month)}</div>
            <FLabel label="Payment Amount ($)">
              <input type="number" value={payAmt} autoFocus onChange={e=>setPayAmt(e.target.value)} placeholder={acct.monthlyPayment||"0.00"} style={{width:"100%",background:"rgba(0,0,0,0.4)",border:`1px solid ${C.borderGold}`,color:C.text,padding:"11px 14px",borderRadius:10,fontSize:20,fontFamily:"Georgia,serif",outline:"none",marginBottom:12}}/>
            </FLabel>
            <FLabel label="Note (optional)"><Inp value={payNote} onChange={setPayNote} placeholder="e.g. paid by check, from savings..."/></FLabel>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <Btn onClick={recordPayment} style={{flex:1,textAlign:"center",padding:"12px"}}>✓ Record</Btn>
              <Btn onClick={()=>{setPayModal(null);setPayAmt("");setPayNote("");}} variant="ghost" style={{flex:1,textAlign:"center",padding:"12px"}}>Cancel</Btn>
            </div>
          </div>
        </div>);
      })()}
    </div>
  );
}

// ── ROOT with PIN gate ────────────────────────────────────────────────────────
function Root(){
  const[unlocked,setUnlocked]=useState(()=>{
    try{
      const t=localStorage.getItem(PIN_STORAGE_KEY);
      if(t&&Date.now()-parseInt(t)<PIN_TIMEOUT_MS)return true;
    }catch{}
    return false;
  });
  return unlocked?<App/>:<PinScreen onUnlock={()=>setUnlocked(true)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
